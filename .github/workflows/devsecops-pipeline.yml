name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────
  # JOB 1: Snyk - Container Scanning
  # ─────────────────────────────────────
  snyk-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Build image for scanning
        run: |
          cp netflix_backend/src/main/resources/application.properties netflix_backend/application.properties
          docker build -t netflix-backend-scan ./netflix_backend

      - name: Snyk Container Scan
        run: snyk container test netflix-backend-scan --severity-threshold=critical
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────
  # JOB 2: Build & Trivy Scan - Backend
  # ─────────────────────────────────────
  build-scan-backend:
    name: Build & Scan Backend Image
    runs-on: ubuntu-latest
    needs: snyk-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: netflixacrrita.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Copy application.properties
        run: cp netflix_backend/src/main/resources/application.properties netflix_backend/application.properties

      - name: Build Backend Docker Image
        run: |
          docker build -t netflixacrrita.azurecr.io/netflix-backend:${{ github.sha }} \
            -t netflixacrrita.azurecr.io/netflix-backend:latest \
            ./netflix_backend

      - name: Trivy Scan - Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: netflixacrrita.azurecr.io/netflix-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Backend Image to ACR
        run: |
          docker push netflixacrrita.azurecr.io/netflix-backend:${{ github.sha }}
          docker push netflixacrrita.azurecr.io/netflix-backend:latest

  # ─────────────────────────────────────
  # JOB 3: Build & Trivy Scan - Frontend
  # ─────────────────────────────────────
  build-scan-frontend:
    name: Build & Scan Frontend Image
    runs-on: ubuntu-latest
    needs: snyk-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to ACR
        uses: docker/login-action@v2
        with:
          registry: netflixacrrita.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Frontend Docker Image
        run: |
          docker build -t netflixacrrita.azurecr.io/netflix-frontend:${{ github.sha }} \
            -t netflixacrrita.azurecr.io/netflix-frontend:latest \
            ./netflix_frontend

      - name: Trivy Scan - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: netflixacrrita.azurecr.io/netflix-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Frontend Image to ACR
        run: |
          docker push netflixacrrita.azurecr.io/netflix-frontend:${{ github.sha }}
          docker push netflixacrrita.azurecr.io/netflix-frontend:latest

  # ─────────────────────────────────────
  # JOB 4: Deploy to AKS
  # ─────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-scan-backend, build-scan-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy Backend to AKS
        run: kubectl apply -f k8s/backend-deployment.yaml

      - name: Deploy Frontend to AKS
        run: kubectl apply -f k8s/frontend-deployment.yaml

      - name: Verify Deployment
        run: kubectl get pods -n netflix

        